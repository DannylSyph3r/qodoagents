# UNDERTAKER AGENT - CONFIDENCE SCORING METHODOLOGY

scoring_formula:
  description: "base_score + reference_points + age_points + export_points - dynamic_penalty"
  range: "50-100 (items below 50 excluded as active code)"
  base_score: 50

calculation_steps:
  step_1_base:
    value: 50
  
  step_2_reference_points:
    0_refs: "+50"
    1_to_2_refs: "+30"
    3_to_5_refs: "+15"
    6_plus_refs: "EXCLUDE (active code)"
  
  step_3_age_points:
    180_plus_days: "+30"
    90_to_179_days: "+20"
    under_90_days: "+10"
  
  step_4_export_points:
    not_exported: "+15"
    exported: "+0"
  
  step_5_dynamic_penalty:
    has_dynamic_usage: "-25"
    no_dynamic_usage: "-0"
  
  step_6_clamp:
    - "If score > 100: score = 100"
    - "If score < 50: EXCLUDE item"

confidence_tiers:
  very_high:
    range: "90-100%"
    rule: "confidence_score >= 90"
    safety: "Safe for automated removal"
  
  high:
    range: "75-89%"
    rule: "confidence_score >= 75 AND confidence_score < 90"
    safety: "Safe with quick review"
  
  medium:
    range: "50-74%"
    rule: "confidence_score >= 50 AND confidence_score < 75"
    safety: "Manual verification required"

special_cases:
  unreachable_code:
    score: 100
    tier: "very_high"
    reasoning: "Code after return/throw is guaranteed unreachable"

reasoning_format:
  template: "{ref_count} references. {days} days old. {export_status}. Score: {breakdown}"
  breakdown: "{ref_pts} (refs) + {age_pts} (age) + {export_pts} (internal) - {dynamic_pts} (dynamic) = {final}%"
  
  example:
    input:
      reference_count: 0
      days_since_last_modified: 547
      is_exported: false
      potential_dynamic_usage: false
    calculation: "50 + 50 (0 refs) + 30 (547 days) + 15 (internal) = 100"
    output: "0 references. 547 days old. Internal function. Score: 50 (refs) + 30 (age) + 15 (internal) = 95%"

safe_to_remove_flag:
  rule: "Use >= comparison (include threshold value)"
  formula: "safe_to_remove = (confidence_score >= min_confidence)"
  critical: "NEVER use > (would exclude threshold)"
  examples:
    - "min_confidence=75, score=75 → safe_to_remove=true"
    - "min_confidence=75, score=74 → safe_to_remove=false"

validation:
  checks:
    - "All scores between 50-100"
    - "All scores >= min_confidence"
    - "Tier matches score (90+=very_high, 75-89=high, 50-74=medium)"
    - "Reasoning includes reference count, age, export status, score breakdown"
  
  tier_assignment:
    - "score >= 90 → very_high"
    - "score >= 75 and < 90 → high"
    - "score >= 50 and < 75 → medium"

conservative_approach:
  - "Uncertain reference count: count higher (lower confidence)"
  - "Uncertain export status: assume exported (no bonus)"
  - "Uncertain dynamic usage: apply penalty"
  - "Common names (test, data, utils): expect higher reference counts"
  - "6+ references: always exclude (active code)"
  rationale: "Very High confidence (90-100%) must be safely removable without review"