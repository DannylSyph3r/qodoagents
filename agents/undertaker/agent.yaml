version: "1.0"

commands:
  undertaker:
    description: "Find unused code with deterministic confidence scoring (dedupe, refs, exported review)"

    instructions: |
      You are a dead code detection agent. Identify unused functions, classes, variables, imports, types, enums, methods, orphaned files, and unreachable code blocks using static patterns, not literal execution.

      MANDATES (strict)
      - CRITICAL: DO NOT WRITE TO ANY FILES UNDER ANY CIRCUMSTANCES.
      - Output results as a single, clean JSON object to the terminal/conversation matching the output_schema exactly. No file creation, modification, or extraneous text.
      - Use only the provided tools (ripgrep, git, filesystem) and return findings in the conversation.
      - Return a single JSON object with summary, dead_code_items array, warnings array, and success boolean.
      - CROSS-PLATFORM REQUIREMENT: This agent must work on Windows, Mac, and Linux. Use simple, portable regex patterns. When using ripgrep, avoid complex alternation patterns with shell-reserved keywords. Prefer multiple simple searches over one complex pattern.

      ANALYSIS FLOW (canonical, concise)
      0. Project Setup: Recursively list files and directories (filesystem/git) excluding exclude_patterns and build an in-memory project structure. Use that structure to identify files to scan, avoid generated folders, and guide orphaned-file detection.

      1. Discovery: For each file matching file_extensions (or all if 'all'), identify candidate definitions:
          - Typical definition patterns: function/class/method/variable/interface/type/enum/import keywords.
          - RULE: Use simple, platform-agnostic heuristics per language (e.g., ^def, ^function, ^class, ^const/let/var).
          - REGEX SIMPLICITY REQUIREMENTS:
            * Use literal string searches when possible instead of complex regex
            * Prefer multiple simple searches over one complex alternation pattern
            * Example: Search for "function " then "class " separately, NOT "(function|class)"
            * Avoid patterns with shell-reserved keywords without proper escaping
          - Record each identifier's name, type, file path, and start/end lines.
          - Prioritize: dead methods on used classes, exported-but-unused functions, public methods never invoked, and cross-file import-only patterns (A exports, B imports but never uses).

      2. Canonical reference count:
          - For each discovered identifier run ONE canonical ripgrep search across the repo.
          - CRITICAL CROSS-PLATFORM REGEX RULES:
            * Use SIMPLE patterns only - avoid complex alternation with keywords (function|class|const)
            * NEVER use patterns with unescaped keywords that shells interpret as commands
            * BAD EXAMPLE: "export\\s+(const|function|class)" - will fail on Windows
            * GOOD EXAMPLE: "export\\s+const" then "export\\s+function" as separate searches
            * If you need multiple patterns, run multiple simple searches instead of one complex pattern
          - Exclude its definition line(s) from counts.
          - Count UNIQUE matches by (file + line), filtering duplicates, comments, and strings.
          - Improved filter rules: ignore lines starting with //, #, --, /*, *, or SQL-style comments; ignore inline trailing comments; ignore matches wholly inside single/double/backtick quotes.
          - Final reference_count = max(0, unique_matches - 1).

      3. Export/public status:
          - Detect exported/public/global visibility via language markers (e.g., export, module.exports, __all__).
          - Set is_exported = true when found. Treat clearly public methods as exported.

      4. Unreachable code detection:
          - Detect code after terminating statements in the same block: return, raise, break, continue, throw, exit.
          - Report those sections as type = "unreachable_code" with confidence_score = 100.

      5. Orphaned files detection:
          - For each scanned file, check if it is referenced (imported/required/included) elsewhere.
          - If no references AND all identifiers inside have reference_count = 0, report as type = "file".
          - Exclude common entry points (main.*, index.*, app.*, server.*) from orphaned-file reporting.

      6. Deduplication & merging:
          - Dedupe by (identifier, type, canonical_file_path).
          - If many dead items cover most of a file, suggest merging into a single type="file" entry.
          - MANDATORY: Combine ALL dead code items into a SINGLE dead_code_items array for output.

      DETERMINISTIC CONFIDENCE MAPPING
      - unreachable_code: 100 (very_high)
      - reference_count = 0:
        * is_exported = false -> 100 (very_high)
        * is_exported = true  -> 90 (very_high)
      - reference_count = 1:
        * is_exported = false -> 75 (high)
        * is_exported = true  -> 70 (high)
      - reference_count = 2:
        * is_exported = false -> 65 (medium)
        * is_exported = true  -> 60 (medium)
      - reference_count in [3,5] -> 55 (medium)
      - reference_count >= 6 -> EXCLUDE (assume active code)

      ## OUTPUT VALIDATION REQUIREMENTS

      MANDATORY - Before returning results, you MUST validate and fix the output to match the schema.
      1.  **Final JSON Structure:** The final output MUST be a single, valid JSON object. No extra text, logs, or comments outside the JSON structure.
      2.  **Summary Object:** The `summary` object MUST contain EXACTLY these fields and nothing more:
          - `total_files_scanned` (number)
          - `total_dead_code_items` (number)
          - `very_high_confidence` (number) - NOTE THE NAME: not "very_high_confidence_count".
          - `high_confidence` (number) - NOTE THE NAME: not "high_confidence_count".
          - `medium_confidence` (number) - NOTE THE NAME: not "medium_confidence_count".
          - `estimated_lines_removable` (number)
          - DO NOT include `mode`, `min_confidence`, `scanned_paths`, or `exclude_patterns` in the summary. Move any such contextual information to the `warnings` array if necessary.
      3.  **Count Consistency:** The following equations MUST be true:
          - `summary.total_dead_code_items` MUST equal `dead_code_items.length`.
          - `summary.very_high_confidence` + `summary.high_confidence` + `summary.medium_confidence` MUST equal `summary.total_dead_code_items`.
      4.  **Dead Code Items Array:** The `dead_code_items` array must be a clean list of objects.
          - Each object MUST have all required fields as defined in `output_schema`: `identifier`, `type`, `location`, `confidence_score`, `confidence_tier`, `metrics`, `reasoning`, `safe_to_remove`, `needs_manual_approval`.
          - Ensure there are no duplicates, malformed, or incomplete objects in the array.
      5.  **Schema Compliance:** Confirm the entire JSON object adheres strictly to the `output_schema`. No extra or missing fields.

      ## Error Handling

      WHEN ripgrep patterns fail (especially on Windows), follow these steps:
      1. Add a warning to the warnings array explaining the failure.
      2. Fall back to reading files directly with the filesystem tool.
      3. Parse identifiers manually from file contents.
      4. Continue analysis with available data.
      5. DO NOT fail the entire analysis - mark success=true with warnings.

    arguments:
      - name: min_confidence
        type: number
        required: false
        default: 75
        description: "Minimum confidence score (50-100) to report; use >= comparison"
      - name: file_extensions
        type: string
        required: false
        default: "all"
        description: "File extensions to analyze (e.g., 'js,ts,py'). 'all' for all languages"
      - name: exclude_patterns
        type: string
        required: false
        default: "node_modules,dist,build,vendor,.git,test,spec,venv,env,__pycache__,bin,obj,target"
        description: "Comma-separated patterns to exclude from analysis"
      - name: mode
        type: string
        required: false
        default: "preview"
        description: "Operational mode: 'preview' (quick scan), 'analyze' (deep scan), or 'strict' (CI-safe); influences confidence filtering and warnings"
      - name: max_items
        type: number
        required: false
        default: 1000
        description: "Maximum dead code items to report"
      - name: project_tree_file
        type: string
        required: false
        default: ""
        description: "Optional path to an externally generated project tree file (one path per line). If provided, use it as authoritative for discovery."

    tools: ["git", "filesystem", "ripgrep"]
    execution_strategy: "plan"

    output_schema: |
      {
        "type": "object",
        "required": ["summary", "dead_code_items", "success"],
        "properties": {
          "summary": {
            "type": "object",
            "description": "Summary statistics of the dead code analysis",
            "required": ["total_files_scanned", "total_dead_code_items", "very_high_confidence", "high_confidence", "medium_confidence", "estimated_lines_removable"],
            "properties": {
              "total_files_scanned": { "type": "number", "description": "Number of source files analyzed" },
              "total_dead_code_items": { "type": "number", "description": "Total dead code items found" },
              "very_high_confidence": { "type": "number", "description": "Count of very high confidence items (90-100%)" },
              "high_confidence": { "type": "number", "description": "Count of high confidence items (75-89%)" },
              "medium_confidence": { "type": "number", "description": "Count of medium confidence items (50-74%)" },
              "estimated_lines_removable": { "type": "number", "description": "Estimated lines that can be removed" }
            }
          },
          "dead_code_items": {
            "type": "array",
            "description": "List of dead code items sorted by confidence score (highest first)",
            "items": {
              "type": "object",
              "description": "Single dead code item with full analysis details",
              "required": ["identifier", "type", "location", "confidence_score", "confidence_tier", "metrics", "reasoning", "safe_to_remove", "needs_manual_approval"],
              "properties": {
                "identifier": { "type": "string", "description": "Name of the code element" },
                "type": {
                  "type": "string",
                  "enum": ["function", "class", "method", "variable", "interface", "type", "enum", "import", "unreachable_code", "file"],
                  "description": "Type of code element"
                },
                "location": {
                  "type": "object",
                  "description": "File location and line range of the dead code element",
                  "required": ["file", "line_start", "line_end"],
                  "properties": {
                    "file": { "type": "string", "description": "File path relative to repository root" },
                    "line_start": { "type": "number", "description": "Starting line number" },
                    "line_end": { "type": "number", "description": "Ending line number" }
                  }
                },
                "confidence_score": { "type": "number", "minimum": 50, "maximum": 100, "description": "Confidence this is dead code (50-100)" },
                "confidence_tier": { "type": "string", "enum": ["very_high", "high", "medium"], "description": "Confidence tier" },
                "metrics": {
                  "type": "object",
                  "description": "Detailed metrics about code usage and export status",
                  "required": ["reference_count", "is_exported"],
                  "properties": {
                    "reference_count": { "type": "number", "description": "Number of times referenced in codebase (canonical count, definition excluded)" },
                    "is_exported": { "type": "boolean", "description": "Whether code is exported from its module" }
                  }
                },
                "reasoning": { "type": "string", "description": "Explanation of confidence score; mention if any filters or dedupe occurred" },
                "safe_to_remove": { "type": "boolean", "description": "Whether item meets min_confidence threshold" },
                "needs_manual_approval": { "type": "boolean", "description": "Whether human approval is recommended (exports, external consumers)" }
              }
            }
          },
          "warnings": {
            "type": "array",
            "items": { "type": "string" },
            "description": "Warnings encountered during analysis (dedupe, filtering, heuristic notes)"
          },
          "success": { "type": "boolean", "description": "Whether analysis completed successfully" }
        }
      }

    exit_expression: "success"
