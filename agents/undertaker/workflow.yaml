# UNDERTAKER AGENT - EXECUTION WORKFLOW
# Execute phases in order: Static Analysis → Historical Analysis → Scoring → Output

phase_1_static_analysis:
  name: "Static Analysis & Discovery"
  
  step_1_identify_files:
    - "Scan repository with filesystem tool"
    - "Apply file_extensions filter (default: all common languages)"
    - "Apply exclude_patterns (default: node_modules,dist,build,vendor,.git,test,spec)"
    - "Build list of source files to analyze"
  
  step_2_parse_code_elements:
    critical: "Execute separate searches - NEVER use pipe | in patterns"
    - "Search for functions: 'function ', 'def ', 'func ', 'fn '"
    - "Search for classes: 'class '"
    - "Search for variables: 'const ', 'let ', 'var '"
    - "Search for exports: 'export ', 'pub ' to detect is_exported"
    - "Store: identifier, type, location (file, line_start, line_end), is_exported"
  
  step_3_count_references:
    - "For each identifier found, search entire codebase for that name"
    - "Count matches (excluding definition line)"
    - "Store reference_count for each element"
    - "If reference_count >= 6: EXCLUDE item (active code)"
  
  step_4_unreachable_code:
    - "Find code after return/throw statements → confidence_score = 100"

phase_2_historical_analysis:
  name: "Historical Analysis"
  
  step_1_git_bulk_operation:
    critical: "Use ONE git command for all files, not per-file"
    
    tool_usage: "Use shell tool to execute git command (shell MCP server is configured)"
    
    git_command: "git log --format='%ai' --name-only --diff-filter=M --all"
    
    parsing_process:
      - "Split git output by newlines"
      - "Lines matching pattern /^\\d{4}-\\d{2}-\\d{2}/ contain dates"
      - "Extract YYYY-MM-DD from date lines (first 10 characters)"
      - "Non-empty lines after dates (without '|') are file paths"
      - "Build map: file_path → last_modified_date_string"
    
    date_calculation:
      critical: "Calculate actual days difference from current date"
      - "Get current date (today)"
      - "For each file: parse last_modified_date_string to Date object"
      - "Calculate: days = floor((today - last_modified_date) / milliseconds_per_day)"
      - "Store actual calculated days_since_last_modified"
      - "Store last_modified_date in YYYY-MM-DD format"
    
    fallback: "If git fails or file not in git history, use filesystem mtime with warning"
    
    validation:
      - "Verify dates are reasonable (not negative, not absurdly high)"
      - "If date parsing fails, use fallback"
      - "Add warning if many files use fallback dates"
  
  step_2_dynamic_usage:
    patterns: ["eval(", "exec(", "Function(", "reflect", "__import__", "Class.forName"]
    - "Search once per pattern across all files"
    - "Build map: file → has_dynamic_patterns"
    - "For each element, check if its file has patterns → potential_dynamic_usage = true"

phase_3_confidence_scoring:
  name: "Confidence Scoring"
  reference: "See scoring.yaml for complete formula"
  
  formula:
    - "Start: base_score = 50"
    - "Add reference points: 0 refs=+50, 1-2 refs=+30, 3-5 refs=+15, 6+ refs=EXCLUDE"
    - "Add age points: 180+ days=+30, 90-179 days=+20, <90 days=+10"
    - "Add export points: not exported=+15, exported=+0"
    - "Subtract dynamic penalty: potential_dynamic_usage=-25"
    - "Calculate raw_score = sum of all components"
    - "Clamp: if raw_score > 100 then final_score = 100, else final_score = raw_score"
  
  tiers:
    - "90-100: very_high"
    - "75-89: high"
    - "50-74: medium"
  
  reasoning_generation:
    format: "{ref_count} references. {days} days old. {export_status}. Score: {calculation}"
    calculation_format: "base + ref_pts (refs) + age_pts (age) + export_pts (internal/exported) - dynamic_pts (dynamic) = raw_score"
    clamping_rule: "If raw_score > 100, append ' → clamped to 100%'"
    critical: "Verify arithmetic is correct - components must sum to raw_score"

phase_4_output_generation:
  name: "Output Generation & Validation"
  
  step_1_filter:
    critical: "Use >= comparison (include threshold value)"
    - "INCLUDE items where confidence_score >= min_confidence"
    - "INCLUDE items where days_since_last_modified >= min_age_days"
    - "Apply max_items limit if needed"
  
  step_2_sort:
    - "Sort by confidence_score DESCENDING (highest first)"
    - "If group_by_confidence=true: separate into very_high, high, medium lists"
  
  step_3_summary:
    calculate:
      - "total_files_scanned: count from step_1"
      - "total_dead_code_items: length of filtered list"
      - "very_high_confidence: count where tier='very_high'"
      - "high_confidence: count where tier='high'"
      - "medium_confidence: count where tier='medium'"
      - "estimated_lines_removable: sum of (line_end - line_start)"
      - "oldest_dead_code_days: max of days_since_last_modified"
    
    validate: "very_high + high + medium MUST equal total_dead_code_items"
  
  step_4_validate_output:
    critical: "DO NOT SKIP - verify before returning"
    checks:
      - "Actual item count == summary.total_dead_code_items"
      - "Tier counts match actual items in output"
      - "All scores >= min_confidence"
      - "All scores between 50-100"
      - "All days_since_last_modified are realistic (not placeholder values)"
      - "All reasoning text contains complete calculation"
      - "Reasoning math is correct (verify sums)"
    action: "If validation fails: STOP and recount"
  
  step_5_return:
    - "Return JSON directly in response (NEVER use write_file)"
    - "Match output_schema in agent.toml exactly"

critical_rules:
  - "Use >= for min_confidence (NOT >)"
  - "Use >= for min_age_days (NOT >)"
  - "Execute separate searches, never pipe | in patterns"
  - "Use bulk git operations (one command for all files)"
  - "Calculate ACTUAL days from dates, not placeholder values"
  - "Verify scoring math is correct before returning"
  - "Validate counts match before returning"
  - "Return JSON directly, never create files"