# The Undertaker - Dead Code Detection Agent
version = "1.0"

[commands.undertaker]
description = "Identifies genuinely unused code with confidence scoring and generates safe removal PRs"

instructions = """
You are The Undertaker, a dead code detection agent. Your mission is to eliminate technical debt by identifying unused code through static analysis and historical validation.

INITIAL SETUP:
Before starting the analysis, read these configuration files (located in the same directory as this agent.toml):
1. rules.yaml - Mandatory behavioral rules and requirements
2. workflow.yaml - Step-by-step execution phases
3. scoring.yaml - Confidence scoring methodology

Use the filesystem tool to read each file. The rules in these files are MANDATORY and take precedence over any other instructions.

EXECUTION APPROACH:
Follow the 4-phase workflow defined in workflow.yaml. Before starting each phase, refer back to workflow.yaml to review the specific steps for that phase.

Phase 1: Static Analysis & Discovery
  Before beginning: Review Phase 1 details in workflow.yaml
  - Identify target files
  - Parse source files (execute separate searches, never use pipe | in patterns)
  - Count references for each element
  - Detect unreachable code

Phase 2: Historical Analysis
  Before beginning: Review Phase 2 details in workflow.yaml
  - Get last modification dates using git
  - Check export status
  - Detect dynamic usage patterns

Phase 3: Confidence Scoring
  Before beginning: Review scoring.yaml for complete methodology
  - Apply the mathematical scoring formula exactly as specified
  - Start with base score of 50
  - Add reference points, age points, export points
  - Subtract dynamic usage penalty
  - Assign confidence tier based on final score
  - Generate reasoning text with score breakdown

Phase 4: Output Generation & Validation
  Before beginning: Review Phase 4 details in workflow.yaml
  - Filter by min_confidence using >= comparison (include threshold value)
  - Filter by min_age_days using >= comparison (include threshold value)
  - Sort by confidence score descending
  - Generate summary statistics
  - VALIDATE all counts match before returning
  - Return JSON directly in response (never create files)

PR CREATION (OPTIONAL):
If create_pr=true:
  - Use git tool to create branch with pattern: {branch_prefix}-{confidence-tier}
  - Commit removals for items meeting min_confidence threshold
  - Create pull request using available tools
  - If dry_run=true: Only show what would be done, don't create actual PR
  - Store PR details in pr_details object in output

CRITICAL RULES (from rules.yaml):
- Use >= for min_confidence and min_age_days (never use >)
- Examples: min_confidence=75 includes items with scores 75, 76, 77... 100
- Summary counts must match: very_high + high + medium = total_dead_code_items
- Execute separate searches for patterns, never use pipe | in regex
- Return JSON directly in response, never use write_file tool
- Validate all counts before returning output

For complete details, refer to the configuration files throughout execution.
"""

arguments = [
    { name = "min_confidence", type = "number", required = false, default = 75, 
      description = "Minimum confidence score (50-100) to report. Items below this are excluded." },
    { name = "min_age_days", type = "number", required = false, default = 90,
      description = "Minimum days since last modification. Filters out recently changed code." },
    { name = "file_extensions", type = "string", required = false, default = "all",
      description = "Comma-separated file extensions to analyze (e.g., 'js,ts,py'). Use 'all' for all supported languages." },
    { name = "exclude_patterns", type = "string", required = false, default = "node_modules,dist,build,vendor,.git,test,spec",
      description = "Comma-separated patterns to exclude from analysis." },
    { name = "include_test_files", type = "boolean", required = false, default = false,
      description = "Whether to analyze test files. Default false excludes test/spec directories." },
    { name = "create_pr", type = "boolean", required = false, default = false,
      description = "Create pull request with dead code removals for items meeting min_confidence." },
    { name = "group_by_confidence", type = "boolean", required = false, default = true,
      description = "Group PR changes by confidence tier (separate PRs for very_high, high, medium)." },
    { name = "dry_run", type = "boolean", required = false, default = false,
      description = "Preview mode - show what would be removed without creating actual PR." },
    { name = "max_items", type = "number", required = false, default = 1000,
      description = "Maximum dead code items to analyze per confidence tier." },
    { name = "branch_prefix", type = "string", required = false, default = "undertaker",
      description = "Prefix for PR branch names (e.g., 'undertaker-very-high-confidence')." }
]

tools = ["filesystem", "git", "shell"]

execution_strategy = "plan"

output_schema = """
{
    "type": "object",
    "properties": {
        "summary": {
            "type": "object",
            "description": "High-level overview of dead code findings",
            "properties": {
                "total_files_scanned": {"type": "number", "description": "Total number of source files analyzed"},
                "total_dead_code_items": {"type": "number", "description": "Total number of dead code items found"},
                "very_high_confidence": {"type": "number", "description": "Count of items with 90-100% confidence"},
                "high_confidence": {"type": "number", "description": "Count of items with 75-89% confidence"},
                "medium_confidence": {"type": "number", "description": "Count of items with 50-74% confidence"},
                "estimated_lines_removable": {"type": "number", "description": "Estimated total lines of code that can be removed"},
                "oldest_dead_code_days": {"type": "number", "description": "Age in days of the oldest dead code found"}
            },
            "required": ["total_files_scanned", "total_dead_code_items"]
        },
        "dead_code_items": {
            "type": "array",
            "description": "List of identified dead code items, sorted by confidence score (highest first)",
            "items": {
                "type": "object",
                "properties": {
                    "identifier": {"type": "string", "description": "Name of the function/class/variable/import"},
                    "type": {"type": "string", "enum": ["function", "class", "variable", "import", "unreachable_code"], "description": "Type of code element"},
                    "location": {
                        "type": "object",
                        "description": "File location of the dead code",
                        "properties": {
                            "file": {"type": "string", "description": "File path relative to repository root"},
                            "line_start": {"type": "number", "description": "Starting line number"},
                            "line_end": {"type": "number", "description": "Ending line number"}
                        },
                        "required": ["file", "line_start", "line_end"]
                    },
                    "confidence_score": {"type": "number", "minimum": 50, "maximum": 100, "description": "Confidence that this is truly dead code (50-100)"},
                    "confidence_tier": {"type": "string", "enum": ["very_high", "high", "medium"], "description": "Human-readable confidence tier"},
                    "metrics": {
                        "type": "object",
                        "description": "Metrics used to calculate confidence score",
                        "properties": {
                            "reference_count": {"type": "number", "description": "Number of times this code is referenced elsewhere"},
                            "days_since_last_modified": {"type": "number", "description": "Days since this code was last changed"},
                            "last_modified_date": {"type": "string", "description": "ISO 8601 date of last modification"},
                            "is_exported": {"type": "boolean", "description": "Whether this is exported/public API"}
                        },
                        "required": ["reference_count", "days_since_last_modified", "is_exported"]
                    },
                    "reasoning": {"type": "string", "description": "Human-readable explanation of why this is considered dead code and the confidence score"},
                    "safe_to_remove": {"type": "boolean", "description": "Whether this item is safe to remove based on min_confidence threshold"}
                },
                "required": ["identifier", "type", "location", "confidence_score", "confidence_tier", "metrics", "reasoning", "safe_to_remove"]
            }
        },
        "warnings": {
            "type": "array",
            "description": "Non-critical issues encountered during analysis (e.g., parse failures, permission errors)",
            "items": {"type": "string"}
        },
        "pr_details": {
            "type": "object",
            "description": "Pull request information if create_pr was enabled",
            "properties": {
                "created": {"type": "boolean", "description": "Whether PR was successfully created"},
                "url": {"type": "string", "description": "URL of created pull request"},
                "items_included": {"type": "number", "description": "Number of dead code items included in PR"}
            }
        },
        "success": {"type": "boolean", "description": "Whether the analysis completed successfully"}
    },
    "required": ["summary", "dead_code_items", "success"]
}
"""

exit_expression = "success && (summary.very_high_confidence > 0 || summary.total_dead_code_items == 0)"