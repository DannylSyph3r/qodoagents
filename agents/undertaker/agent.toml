# The Undertaker - Dead Code Detection Agent
version = "1.0"

[commands.undertaker]
description = "Reliable dead code detection agent that identifies unused functions, classes, variables, imports, and unreachable code with confidence scoring"

instructions = """
You are a dead code detection agent. Find unused code elements in the repository using static analysis.

CORE MISSION:
- Identify unused functions, classes, variables, imports, types, enums, methods, and unreachable code
- Provide confidence scoring based on reference counts and export status  
- Be reliable and dependable within reasonable limits
- Output clean JSON results for integration

ANALYSIS PROCESS:
1. **Project Discovery**: Scan source files matching file_extensions, excluding generated/vendor folders
   - Use shell commands like `find` and `tree` for comprehensive directory traversal
   - Leverage `file` command to identify file types automatically
2. **Definition Detection**: Find function/class/variable/import definitions using language-specific patterns
   - Combine ripgrep with shell text processing (`grep`, `sed`, `awk`) for refined pattern matching
   - Use `wc` and `stat` for file metrics and size analysis
3. **Reference Counting**: For each identifier, count actual usage across the codebase (excluding definition)
   - Enhance ripgrep results with shell commands like `sort`, `uniq`, and `cut` for deduplication
   - Use `xargs` for efficient batch processing of multiple files
4. **Export Analysis**: Detect if code is exported/public (affects confidence scoring)
5. **Unreachable Code**: Find code after return/throw/break statements in same block
6. **Confidence Scoring**: Apply deterministic confidence rules based on usage patterns

CONFIDENCE RULES:
- No references + not exported = 100% confidence (very_high)
- No references + exported = 90% confidence (very_high) 
- 1 reference + not exported = 75% confidence (high)
- 1 reference + exported = 70% confidence (high)
- 2+ references = 60% or lower (medium)
- Unreachable code = 100% confidence (very_high)

TECHNICAL REQUIREMENTS:
- Use ripgrep for efficient cross-repository searching
- Filter out comments, strings, and false positives
- Handle multiple programming languages with appropriate patterns
- Deduplicate results and merge when appropriate
- Only include items with confidence >= min_confidence threshold

OUTPUT REQUIREMENTS:
- Return single valid JSON object matching output_schema
- No extra text, logs, or comments outside JSON structure
- Include summary statistics and detailed findings
- Provide actionable recommendations for each item

ERROR HANDLING:
- If tools fail, add warnings but continue analysis
- Fall back to filesystem reading if ripgrep patterns fail
- Mark success=true with warnings rather than failing entirely
- Handle cross-platform compatibility issues gracefully

FOCUS ON RELIABILITY:
- Prioritize working correctly over handling every edge case
- Use simple, proven patterns over complex regex
- Provide useful results even with partial data
- Be dependable for common dead code scenarios
"""

# Arguments for customizing the analysis
arguments = [
  { name = "file_extensions", type = "array", required = false, description = "File extensions to scan (e.g., ['ts','js','py']). Use 'all' for all files." },
  { name = "min_confidence", type = "number", required = false, default = 70, description = "Minimum confidence threshold (50-100)" },
  { name = "exclude_patterns", type = "array", required = false, description = "Patterns to exclude from scanning" },
  { name = "include_tests", type = "boolean", required = false, default = false, description = "Whether to include test files in analysis" }
]

# Tools the agent can use
tools = ["git", "filesystem", "ripgrep", "shell"]

# MCP Servers configuration
mcpServers = """
{
  "shell": {
    "command": "uvx",
    "args": [
      "mcp-shell-server"
    ],
    "env": {
      "ALLOW_COMMANDS": "find,ls,cat,head,tail,wc,grep,rg,ripgrep,sort,uniq,cut,tr,sed,awk,basename,dirname,pwd,tree,file,stat,du,which,whereis,echo,test,true,false,git,diff,xargs,tee"
    }
  }
}
"""

# Use plan strategy for multi-step analysis
execution_strategy = "plan"

# Simplified but comprehensive output schema
output_schema = """
{
  "type": "object",
  "required": ["summary", "dead_code_items", "success"],
  "properties": {
    "summary": {
      "type": "object",
      "required": ["total_files_scanned", "total_dead_code_items", "very_high_confidence", "high_confidence", "medium_confidence", "estimated_lines_removable"],
      "properties": {
        "total_files_scanned": {
          "type": "number",
          "description": "Number of source files analyzed"
        },
        "total_dead_code_items": {
          "type": "number", 
          "description": "Total dead code items found"
        },
        "very_high_confidence": {
          "type": "number",
          "description": "Count of very high confidence items (90-100%)"
        },
        "high_confidence": {
          "type": "number",
          "description": "Count of high confidence items (70-89%)"
        },
        "medium_confidence": {
          "type": "number", 
          "description": "Count of medium confidence items (50-69%)"
        },
        "estimated_lines_removable": {
          "type": "number",
          "description": "Estimated lines that can be safely removed"
        }
      }
    },
    "dead_code_items": {
      "type": "array",
      "description": "List of dead code items found, sorted by confidence score",
      "items": {
        "type": "object",
        "required": ["identifier", "type", "location", "confidence_score", "confidence_tier", "reference_count", "is_exported", "safe_to_remove", "reasoning"],
        "properties": {
          "identifier": {
            "type": "string",
            "description": "Name of the code element"
          },
          "type": {
            "type": "string", 
            "enum": ["function", "class", "method", "variable", "interface", "type", "enum", "import", "unreachable_code", "file"],
            "description": "Type of code element"
          },
          "location": {
            "type": "object",
            "required": ["file", "start_line", "end_line"],
            "properties": {
              "file": {
                "type": "string",
                "description": "File path relative to repository root"
              },
              "start_line": {
                "type": "number",
                "description": "Starting line number"
              },
              "end_line": {
                "type": "number", 
                "description": "Ending line number"
              }
            }
          },
          "confidence_score": {
            "type": "number",
            "minimum": 50,
            "maximum": 100,
            "description": "Confidence this is dead code (50-100)"
          },
          "confidence_tier": {
            "type": "string",
            "enum": ["very_high", "high", "medium"],
            "description": "Confidence tier based on score"
          },
          "reference_count": {
            "type": "number",
            "description": "Number of times referenced in codebase (excluding definition)"
          },
          "is_exported": {
            "type": "boolean",
            "description": "Whether code is exported/public"
          },
          "safe_to_remove": {
            "type": "boolean", 
            "description": "Whether item can be safely removed"
          },
          "reasoning": {
            "type": "string",
            "description": "Explanation of why this is considered dead code"
          }
        }
      }
    },
    "warnings": {
      "type": "array",
      "items": {
        "type": "string"
      },
      "description": "Warnings encountered during analysis"
    },
    "success": {
      "type": "boolean",
      "description": "Whether analysis completed successfully"
    }
  }
}
"""

# Success condition for CI/CD integration
exit_expression = "success"