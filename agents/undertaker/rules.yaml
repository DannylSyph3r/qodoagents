# UNDERTAKER AGENT - MANDATORY RULES

core_philosophy:
  - "Think step-by-step for complex changes"
  - "Simplicity over cleverness - don't over-engineer"
  - "Fix root causes, not symptoms"
  - "Every line should have a purpose"

critical_requirements:
  output_format:
    rule: "Return JSON directly in response - NEVER create files"
    violations:
      - "DO NOT use write_file tool"
      - "DO NOT ask for approval to write files"
  
  parameter_handling:
    min_confidence:
      rule: "Use >= comparison (greater than or equal to)"
      wrong: "NEVER use > (excludes threshold value)"
    
    min_age_days:
      rule: "Use >= comparison (greater than or equal to)"
      wrong: "NEVER use > (excludes threshold)"
  
  counting_validation:
    rule: "Summary counts MUST match actual items"
    steps:
      - "Count very_high: where confidence_tier == 'very_high'"
      - "Count high: where confidence_tier == 'high'"
      - "Count medium: where confidence_tier == 'medium'"
      - "Verify: very_high + high + medium == total_dead_code_items"
      - "If mismatch: STOP and recount"
    mandatory: "DO NOT skip validation"
  
  date_accuracy:
    rule: "Calculate ACTUAL days from git dates, not placeholder values"
    critical:
      - "Parse git log output to extract real modification dates"
      - "Calculate days difference from current date to modification date"
      - "NEVER use hardcoded or placeholder day values"
      - "Verify dates are realistic (not negative, not absurdly high)"
    fallback: "If git fails, use filesystem dates and add warning"
  
  scoring_accuracy:
    rule: "Reasoning text must show correct arithmetic"
    critical:
      - "Calculate raw_score = base + ref_pts + age_pts + export_pts - dynamic_pts"
      - "Verify sum: components must equal raw_score"
      - "If raw_score > 100, show clamping: 'X → clamped to 100%'"
      - "Reasoning must include complete calculation breakdown"
    validation: "Before returning, verify all reasoning math is correct"

cross_platform:
  shell_commands:
    forbidden: "rg 'function|class|const' (pipe | causes failures on Windows)"
    correct: "Run separate: rg 'function' then rg 'class' then rg 'const'"

performance:
  git_operations:
    wrong: "git log per file (too slow)"
    correct: "Bulk: git log --format='%ai' --name-only (one command for all)"
  
  reference_counting:
    approach: "Batch similar searches when possible"
  
  principles:
    - "Use bulk operations instead of loops"
    - "Batch similar operations to reduce overhead"

conservative_approach:
  - "When uncertain about references: count conservatively (higher = lower confidence)"
  - "Dynamic usage patterns: reduce confidence by 25 points"
  - "Exported code: no bonus (might be used externally)"
  - "6+ references: exclude entirely (active code)"
  rationale: "Very High confidence (90-100%) must be safely removable without review"

execution_discipline:
  workflow_order:
    - "Phase 1: Static Analysis & Discovery"
    - "Phase 2: Historical Analysis"
    - "Phase 3: Confidence Scoring"
    - "Phase 4: Output Generation & Validation"
  rule: "Execute phases IN SEQUENCE - do not skip or reorder"

quality_assurance:
  pre_output_checklist:
    - "All scores 50-100"
    - "All items meet min_confidence (>=)"
    - "Summary counts match actual items"
    - "Reasoning text includes score breakdown with correct math"
    - "Days_since_last_modified calculated from actual dates, not placeholders"
    - "All dates in YYYY-MM-DD format"
    - "safe_to_remove aligns with min_confidence"
  requirement: "Pass ALL validation checks before returning"

error_handling:
  scenarios:
    git_failures: "Add warning, use filesystem fallback for dates"
    parse_failures: "Skip file, add warning"
    missing_files: "Skip item, add warning"
    search_failures: "Report in warnings, continue with available data"
    date_calculation_errors: "Use fallback date, add warning"
  principle: "Handle gracefully with clear messages"